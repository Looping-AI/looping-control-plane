# yaml-language-server: $schema=http://raw.githubusercontent.com/dfinity/icp-cli/refs/tags/v0.2.0/docs/schemas/icp-yaml-schema.json

canisters:
  - name: open-org-backend
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: src/open-org-backend/main.mo
        args: ""

  - name: test-canister
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: tests/unit-tests/open-org-backend/test-canister.mo
        args: ""

networks:
  - name: local
    mode: managed
    ii: true

environments:
  - name: local
    network: local
    canisters: [open-org-backend]

  - name: test
    network: local
    canisters: [test-canister]
