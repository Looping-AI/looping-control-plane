# yaml-language-server: $schema=http://raw.githubusercontent.com/dfinity/icp-cli/refs/tags/v0.2.0/docs/schemas/icp-yaml-schema.json

canisters:
  - name: control-plane-core
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: src/control-plane-core/main.mo
        args: ""

  - name: test-canister
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: tests/unit-tests/control-plane-core/test-canister.mo
        args: ""

networks:
  - name: local
    mode: managed
    ii: true

environments:
  - name: local
    network: local
    canisters: [control-plane-core]

  - name: test
    network: local
    canisters: [test-canister]
