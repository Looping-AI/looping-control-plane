# yaml-language-server: $schema=http://raw.githubusercontent.com/dfinity/icp-cli/refs/tags/v0.2.0/docs/schemas/icp-yaml-schema.json

canisters:
  - name: control-plane-core
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: src/control-plane-core/main.mo
        args: ""

# Note: internal-engine is a Motoko actor class compiled into control-plane-core's Wasm.
# Core spawns it dynamically at runtime as a separate canister instance, so no icp.yaml entry needed.

networks:
  - name: local
    mode: managed
    ii: true
    gateway:
      domains:
        - "ngrok-free.dev"

environments:
  - name: local
    network: local
    canisters: [control-plane-core]
    settings:
      control-plane-core:
        environment_variables:
          CANISTER_ENV: local

  - name: staging
    network: ic
    canisters: [control-plane-core]
    settings:
      control-plane-core:
        environment_variables:
          CANISTER_ENV: staging

  - name: production
    network: ic
    canisters: [control-plane-core]
    settings:
      control-plane-core:
        environment_variables:
          CANISTER_ENV: production
