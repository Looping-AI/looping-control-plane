version: 2
updates:
  # npm / bun dependencies (package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      npm-all:
        patterns:
          - "*"

  # GitHub Actions (.github/workflows/)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  # ---------------------------------------------------------------
  # NOTE: Mops (Motoko package manager) is NOT supported by
  # Dependabot. Update mops.toml dependencies manually:
  #   core, llm, sha2, json, ic-certification (+ dev: test)
  # Check for updates at: https://mops.one
  # ---------------------------------------------------------------
