name: test
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        shell: bash
        run: bun i --frozen-lockfile

      - name: Setup DFX
        uses: dfinity/setup-dfx@main
        with:
          dfx-version: "auto"

      - name: Setup DIDC
        shell: bash
        run: |
          # Get latest release tag
          export VERSION_DIDC=$(curl --silent "https://api.github.com/repos/dfinity/candid/releases/latest" \
            | grep -e '"tag_name"' | cut -c 16-25)

          # Download and install
          wget https://github.com/dfinity/candid/releases/download/${VERSION_DIDC}/didc-linux64
          sudo mv didc-linux64 /usr/local/bin/didc
          chmod +x /usr/local/bin/didc

          # Verify
          didc --version

      - name: Setup Mops
        uses: dfinity/setup-mops@v1

      - name: Install Mops Packages
        run: mops install

      - name: Build
        run: |
          dfx start --background
          dfx deploy
          dfx stop

      - name: Check Format
        run: bun run format:check

      - name: Lint Motoko
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/caffeinelabs/lintoko/releases/download/v0.7.0/lintoko-installer.sh | sh
          bun run lint

      - name: Create test-env.mo
        run: |
          cd tests/unit-tests/bot-agent-backend
          cat > test-env.mo << 'EOF'
          module {
            public let GROQ_TEST_KEY : Text = "${{ secrets.GROQ_TEST_KEY }}";
          };
          EOF

      - name: Test
        run: bun run test
