name: test
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Load version pins
        run: grep -Ev '^[[:space:]]*(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set environment to test
        run: sed -i 's/#local/#test/' src/control-plane-core/constants.mo

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        shell: bash
        # Dependabot PRs update package versions so the lockfile legitimately changes.
        # The dependabot-lockfile workflow commits the updated lockfile separately, but
        # it runs in parallel with this job — we cannot depend on its commit being present
        # here. Use plain `bun install` for Dependabot PRs so we install correct versions;
        # keep --frozen-lockfile for all other runs to catch accidental lockfile drift.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun i --frozen-lockfile
          fi

      - name: Setup ICP-CLI
        shell: bash
        run: npm install -g @icp-sdk/icp-cli@${ICP_CLI_VERSION} @icp-sdk/ic-wasm@${IC_WASM_VERSION}

      - name: Setup DIDC
        shell: bash
        run: |
          wget https://github.com/dfinity/candid/releases/download/${DIDC_VERSION}/didc-linux64
          sudo mv didc-linux64 /usr/local/bin/didc
          sudo chmod +x /usr/local/bin/didc

      - name: Setup Mops
        uses: dfinity/setup-mops@v1

      - name: Install Mops Packages
        run: mops install

      - name: Check Format
        run: bun run format:check

      - name: Lint Motoko
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/caffeinelabs/lintoko/releases/download/${LINTOKO_VERSION}/lintoko-installer.sh | sh
          bun run lint

      - name: Test ICP Cli
        run: |
          icp network start --background
          icp deploy
          icp network stop

      - name: Test
        run: bun run test
